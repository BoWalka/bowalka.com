<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beau Walker | Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #00ffcc;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 255, 204, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 255, 204, 0.4);
        }
        .image-name {
            text-align: center;
            margin-top: 8px;
            font-size: 0.9em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>My Images Gallery</h1>
    <div class="gallery" id="gallery"></div>

    <script>
        // List all your image filenames here (add new ones as you upload them)
        const images = [
            "photo1.jpg",
            "cyberdeck.jpg",
            "project2.png",
            "screenshot.png",
            // Add more lines like this:
            // "another-image.webp",
        ];

        const gallery = document.getElementById('gallery');

        images.forEach(filename => {
            const div = document.createElement('div');
            div.innerHTML = `
                <img src="images/${filename}" 
                     alt="${filename}" 
                     loading="lazy">
                <div class="image-name">${filename}</div>
            `;
            gallery.appendChild(div);
        });
    </script>
</body>
</html>
