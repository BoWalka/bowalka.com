<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beau's Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #ddd;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { 
            color: #00ffcc; 
            margin-bottom: 30px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.25);
            transition: all 0.3s ease;
        }
        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 255, 204, 0.4);
        }
        .image-name {
            margin-top: 10px;
            color: #888;
            font-size: 0.95em;
        }
        .loading {
            color: #00ffcc;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>My Images Gallery</h1>
    <div class="loading" id="status">Loading images...</div>
    <div class="gallery" id="gallery"></div>

    <script>
        const repoOwner = "BoWalka";
        const repoName = "bowalka.com";
        const folderPath = "images";

        fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`)
            .then(response => response.json())
            .then(files => {
                document.getElementById('status').style.display = 'none';
                
                const gallery = document.getElementById('gallery');
                
                // Filter only image files
                const imageFiles = files.filter(file => 
                    file.type === "file" && 
                    /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)
                );

                if (imageFiles.length === 0) {
                    gallery.innerHTML = "<p>No images found in /images folder yet.</p>";
                    return;
                }

                imageFiles.forEach(file => {
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <img src="https://raw.githubusercontent.com/${repoOwner}/${repoName}/master/${folderPath}/${file.name}" 
                             alt="${file.name}" 
                             loading="lazy"
                             onerror="this.style.display='none';">
                        <div class="image-name">${file.name}</div>
                    `;
                    gallery.appendChild(div);
                });
            })
            .catch(err => {
                document.getElementById('status').innerHTML = 
                    "Error loading images. Make sure images are in the <strong>/images</strong> folder.";
                console.error(err);
            });
    </script>
</body>
</html>
