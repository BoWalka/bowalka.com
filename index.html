<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beau Walker (BoWalka) - Software Developer & Open-Source Engineer">
    <title>Beau Walker | Software Developer & Open-Source Engineer</title>
    <style>
        :root { --neon: #00D4FF; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
            background: #0a0a1f;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.09;
            pointer-events: none;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 2; }
        .hero { text-align: center; padding: 160px 20px 120px; }
        .hero h1 { font-size: 3.8rem; font-weight: 700; color: white; text-shadow: 0 0 25px var(--neon); }
        .hero p { font-size: 1.5rem; color: var(--neon); margin: 15px 0 40px; }
        .lead-button {
            display: inline-block;
            background: #00ff9d;
            color: #000;
            font-weight: bold;
            font-size: 1.5rem;
            padding: 20px 50px;
            border-radius: 12px;
            text-decoration: none;
            box-shadow: 0 0 35px #00ff9d;
            transition: all 0.3s ease;
        }
        .lead-button:hover {
            transform: scale(1.1);
            background: white;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="container">
        <div class="hero">
            <h1>Beau Walker</h1>
            <p class="hero p">Software Developer & Open-Source Engineer</p>
            
            <a href="leads.html" class="lead-button">
                Get Fresh Google Maps Leads →
            </a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = '01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 31, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff9d';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
        window.addEventListener('resize', () => {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        });
    </script>
</body>
</html>
