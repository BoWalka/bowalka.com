<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Beau Walker (BoWalka) - Software Developer & Open-Source Engineer">
    <title>Beau Walker | Software Developer & Open-Source Engineer</title>
    <style>
        :root { --neon: #00D4FF; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
            background: #0a0a1f;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.09;
            pointer-events: none;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 2; }
        .hero { text-align: center; padding: 160px 20px 100px; }
        .hero h1 { font-size: 3.8rem; font-weight: 700; color: white; text-shadow: 0 0 20px var(--neon); }
        .hero p { font-size: 1.5rem; color: var(--neon); margin: 10px 0 30px; }
        .lead-button {
            display: inline-block;
            background: #00ff9d;
            color: #000;
            font-weight: bold;
            font-size: 1.4rem;
            padding: 18px 42px;
            border-radius: 12px;
            text-decoration: none;
            margin: 30px 0;
            box-shadow: 0 0 30px #00ff9d;
            transition: all 0.3s;
        }
        .lead-button:hover {
            transform: scale(1.08);
            background: white;
        }
        section { padding: 90px 0; }
        h2 { font-size: 2.4rem; text-align: center; margin-bottom: 50px; color: white; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="container">
        <div class="hero">
            <h1>Beau Walker</h1>
            <p class="tagline">Software Developer & Open-Source Engineer</p>
            
            <a href="leads.html" class="lead-button">
                Get Fresh Google Maps Business Leads →
            </a>
            
            <p style="color:#00ff9d; margin-top:20px; font-size:1.1rem;">
                Targeted leads with phone numbers • Any niche • Any US city
            </p>
        </div>
        <!-- Rest of your original content can go here -->
        <section>
            <h2>Current Projects & Skills</h2>
            <p style="text-align:center; color:#888;">Your original portfolio content would go here...</p>
        </section>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = '01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 31, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff9d';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
